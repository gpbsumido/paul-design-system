name: Publish

on:
  push:
    branches: [main]

permissions:
  id-token: write   # required for OIDC token minting
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build --workspace=packages/tokens

      - name: Build react
        run: npm run build --workspace=packages/react

      - name: Build angular
        run: npm run build --workspace=packages/angular

      - name: Publish packages
        # no NPM_TOKEN needed -- npm CLI exchanges the OIDC token
        # for temporary registry credentials automatically
        run: |
          for pkg in tokens css react angular; do
            cd packages/$pkg
            PACKAGE_NAME=$(node -p "require('./package.json').name")
            PACKAGE_VERSION=$(node -p "require('./package.json').version")
            if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null; then
              echo "Skipping ${PACKAGE_NAME}@${PACKAGE_VERSION} — already published"
            else
              echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION}"
              npm publish --access public --provenance
            fi
            cd ../..
          done
