name: Chromatic

on:
  pull_request:
    branches: [develop, main]

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build --workspace=packages/tokens

      - name: Build Storybook
        run: npm run build-storybook --workspace=packages/storybook

      - name: Run Chromatic
        id: chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: packages/storybook/storybook-static
          autoAcceptChanges: main
          exitZeroOnChanges: true

      # - name: Run interaction tests
      #   run: npm run test-storybook --workspace=packages/storybook
      #   env:
      #     TARGET_URL: ${{ steps.chromatic.outputs.storybookUrl }}
